name: Build Job
on: 
  #push:
    #branches: 
      #- main
  ## This triggers the workflow when a pull request is opened, synchronized, or reopened against the main branch. It allows you to run tests and checks on the code changes before they are merged into the main branch.
  pull_request:
    branches:
      - main
  ## Allows manual triggering of the workflow from the GitHub Actions tab    
  workflow_dispatch:
## Permissions for the workflow
permissions:
  contents: read

env:
 ECR_REPOSITORY: 'vprofile-appimage'

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      # This step checks out the code from the repository so that it can be built and tested in subsequent steps.
      - name: Code checkout
        uses: actions/checkout@v5
        with:
        ## This ensures that the full commit history is available, which can be useful for certain build tools and for generating changelogs or release notes.
          fetch-depth: 0

      - name: Maven Build
        run: mvn install

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

      - name: notify if the build fails
        if: failure()
        run: echo "Build failed! Please check the logs for details."

  Testing:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Run tests on main branch
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: Checkstyle
        if : github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: Run test on other branches
        if: github.ref != 'refs/heads/main'
        run: echo "Tests are only run on the main branch. Skipping tests for this branch."

  Security-Scan:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: .
          format: 'json'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          output: 'results.json'

      - name: Upload trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: results.json
  
  build-and-push-docker-image:
    runs-on: ubuntu-latest
    environment: dev
    needs: [Build, Testing, Security-Scan]
    if : github.ref == 'refs/heads/main'
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        # This step configures the AWS credentials needed to authenticate with Amazon ECR (Elastic Container Registry) and perform actions such as pushing Docker images. The credentials are securely stored in GitHub Secrets and accessed using the secrets context.
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          
      - name: Login to Amazon ECR
        id: login-ecr 
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Docker-files/app/multistage/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG


